name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      APP_SIGNING_IDENTITY: ${{ secrets.APP_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unsigned release
        if: env.APP_SIGNING_IDENTITY == '' || env.APPLE_ID == '' || env.APPLE_APP_PASSWORD == '' || env.APPLE_TEAM_ID == ''
        run: chmod +x scripts/build-release.sh && scripts/build-release.sh

      - name: Build signed and notarized release
        if: env.APP_SIGNING_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        run: chmod +x scripts/notarize-release.sh && scripts/notarize-release.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cclips-release
          path: dist/*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-notes.md
          files: |
            dist/Cclips-macOS.zip
            dist/Cclips-macOS.dmg
